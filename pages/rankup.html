<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="../manifest.json">
<title>TACTICAL FITNESS — RANK UP</title>
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/accessibility.css">
<style>

/* ── v2 FONT / ACCESSIBILITY OVERRIDE ── */
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root {
  --font-body: 'Sarabun', sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
  --text-base: 17px;
  --text-sm:   15px;
  --text-xs:   13px;
  --text-md:   20px;
  --text-lg:   24px;
  --bnav-h:    68px;
}
body { font-family: var(--font-body); font-size: var(--text-base); }
.bnav-label { font-family: var(--font-body) !important; font-size: 11px; font-weight: 600; }
.nav-item, .nav-label { font-family: var(--font-body) !important; font-size: 14px; }
.section-h, .sec-h { font-family: var(--font-mono) !important; font-size: 12px; }


/* ═══════════════════════════════════════════
   RANK-UP SCREEN — UI Spec §6.3
   Full-screen takeover, Level 5 animation
═══════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #000;
  color: var(--white);
  font-family: var(--body);
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ── Flash Overlay ── */
.flash {
  position: fixed; inset: 0;
  background: #fff;
  opacity: 0;
  pointer-events: none;
  z-index: 200;
  transition: opacity 0.08s ease;
}
.flash.pop { opacity: 0.85; }

/* ── Scanline dim ── */
.scan-dim {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  pointer-events: none;
  z-index: 5;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.scan-dim.on { opacity: 1; }

/* ── Particle Canvas ── */
#particles {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 10;
}

/* ── Main container ── */
.stage {
  position: relative;
  z-index: 20;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  min-height: 100vh;
  padding: 40px 24px;
  text-align: center;
}

/* ── Old rank glitch-out ── */
.old-rank {
  font-family: var(--head);
  font-size: clamp(22px, 5vw, 36px);
  letter-spacing: 6px;
  color: var(--gray);
  margin-bottom: 8px;
  min-height: 44px;
  opacity: 1;
  transition: opacity 0.3s ease;
}
.old-rank.gone { opacity: 0; }

/* ── Badge frame ── */
.rank-frame {
  border: 2px solid var(--green);
  border-radius: 12px;
  padding: 28px 40px;
  position: relative;
  margin: 20px 0;
  background: rgba(0,255,136,0.04);
  box-shadow: 0 0 40px rgba(0,255,136,0.25), inset 0 0 40px rgba(0,255,136,0.06);
  min-width: min(380px, 90vw);
  opacity: 0;
  transform: scale(0.85);
  transition: opacity 0.4s var(--ease-out), transform 0.4s var(--ease-out), box-shadow 0.4s ease;
}
.rank-frame.show {
  opacity: 1;
  transform: scale(1);
  box-shadow: 0 0 60px rgba(0,255,136,0.45), inset 0 0 40px rgba(0,255,136,0.08);
}

/* Corner ornaments */
.rank-frame::before,
.rank-frame::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border-color: var(--green);
  border-style: solid;
  opacity: 0.6;
}
.rank-frame::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
.rank-frame::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

.frame-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--green);
  margin-bottom: 10px;
  opacity: 0.7;
}

.rank-icon {
  font-size: 52px;
  line-height: 1;
  margin-bottom: 12px;
  display: block;
  filter: drop-shadow(0 0 16px rgba(0,255,136,0.5));
}

/* ── New rank typewriter ── */
.new-rank-text {
  font-family: var(--head);
  font-size: clamp(28px, 7vw, 48px);
  letter-spacing: 6px;
  color: var(--white);
  text-shadow: 0 0 30px var(--green-glow), 0 0 60px rgba(0,255,136,0.2);
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
}

.new-rank-char {
  display: inline-block;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.12s ease, transform 0.12s ease;
}
.new-rank-char.show {
  opacity: 1;
  transform: translateY(0);
}

.rank-tier-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--green);
  margin-top: 8px;
  opacity: 0.7;
}

/* ── Prestige stars ── */
.prestige-stars {
  display: flex;
  gap: 6px;
  justify-content: center;
  margin-top: 10px;
  min-height: 22px;
}
.prestige-star {
  font-size: 16px;
  opacity: 0;
  transform: scale(0.3);
  transition: opacity 0.3s ease, transform 0.3s var(--ease-out);
  filter: drop-shadow(0 0 6px var(--amber));
}
.prestige-star.show { opacity: 1; transform: scale(1); }

/* ── Next targets ── */
.next-targets {
  margin-top: 28px;
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 0.4s ease, transform 0.4s ease;
  width: 100%;
  max-width: 360px;
}
.next-targets.show { opacity: 1; transform: translateY(0); }

.next-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--gray2);
  margin-bottom: 10px;
}

.target-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}
.target-chip {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--gray);
  letter-spacing: 1px;
}
.target-chip span { color: var(--amber); }

/* ── Confirm button ── */
.confirm-btn {
  margin-top: 32px;
  padding: 14px 40px;
  background: transparent;
  border: 1px solid var(--green);
  border-radius: 8px;
  color: var(--green);
  font-family: var(--head);
  font-size: 13px;
  letter-spacing: 3px;
  cursor: pointer;
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 0.4s ease, transform 0.4s ease, background 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.confirm-btn.show { opacity: 1; transform: translateY(0); }
.confirm-btn:hover, .confirm-btn:active {
  background: var(--green-dim);
  box-shadow: 0 0 20px rgba(0,255,136,0.3);
}

/* ── Prestige special overlay ── */
.prestige-overlay {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, rgba(255,170,0,0.15) 0%, transparent 70%);
  pointer-events: none;
  z-index: 8;
  opacity: 0;
  transition: opacity 0.6s ease;
}
.prestige-overlay.on { opacity: 1; }

</style>
</head>
<body>

<div class="flash" id="flash"></div>
<div class="scan-dim" id="scanDim"></div>
<div class="prestige-overlay" id="prestigeOverlay"></div>
<canvas id="particles"></canvas>

<div class="stage">

  <!-- Old rank fades out -->
  <div class="old-rank" id="oldRankEl">—</div>

  <!-- Badge frame -->
  <div class="rank-frame" id="rankFrame">
    <div class="frame-label" data-i18n="rankup.promoted">// เลื่อนยศสำเร็จ</div>
    <span class="rank-icon" id="rankIcon">🎖</span>
    <div class="new-rank-text" id="newRankText"></div>
    <div class="rank-tier-label" id="rankTierLabel"></div>
    <div class="prestige-stars" id="prestigeStarsEl"></div>
  </div>

  <!-- Next targets -->
  <div class="next-targets" id="nextTargets">
    <div class="next-label" data-i18n="rankup.next_goal">// เป้าหมายถัดไป</div>
    <div class="target-chips" id="targetChips"></div>
  </div>

  <!-- Confirm -->
  <button class="confirm-btn" id="confirmBtn" onclick="finish()">
    รับทราบ — เดินหน้าต่อ
  </button>

</div>

<script src="../js/i18n.js"></script>
<script src="../js/more-nav.js"></script>
<script src="../js/core.js"></script>
<script src="../js/sidebar.js"></script>
<script>
'use strict';

/* ════════════════════════════════════════════
   RANK-UP ANIMATION ENGINE — UI Spec §6.3
   Level 5 Animation:
   0ms    → Flash white 80ms
   80ms   → Scan-dim on (darken 70%)
   400ms  → Old rank glitch → gone
   800ms  → Frame reveal
   900ms  → Typewriter: new rank name
   1400ms → Tier label + prestige stars
   1800ms → Next targets
   2200ms → Confirm button
════════════════════════════════════════════ */

const TIER_ICONS = {
  civilian: '👤', enlisted: '🪖', nco: '⚙️', officer: '⭐', general: '🌟'
};
const TIER_NAMES_TH = {
  civilian: 'พลเรือน', enlisted: 'ชั้นประทวน',
  nco: 'นายสิบ', officer: 'นายทหาร', general: 'นายพล'
};

let _newRank = null, _oldRank = null, _prestige = 0, _nextRank = null;

/* ── particle system ── */
const canvas  = document.getElementById('particles');
const ctx     = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function spawnParticles(isPrestige = false) {
  const colors = isPrestige
    ? ['255,200,0', '255,220,50', '255,170,0']
    : ['0,255,136', '0,200,100', '100,255,180'];

  for (let i = 0; i < (isPrestige ? 80 : 50); i++) {
    particles.push({
      x: canvas.width  * (0.3 + Math.random() * 0.4),
      y: canvas.height * (0.3 + Math.random() * 0.3),
      vx: (Math.random() - 0.5) * 4,
      vy: -Math.random() * 5 - 1,
      life: 1,
      decay: 0.012 + Math.random() * 0.015,
      size: 2 + Math.random() * 3,
      color: colors[Math.floor(Math.random() * colors.length)],
    });
  }
}

function animParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08; // gravity
    p.life -= p.decay;
    ctx.globalAlpha = p.life;
    ctx.fillStyle   = `rgba(${p.color},${p.life})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  requestAnimationFrame(animParticles);
}
animParticles();

/* ── glitch helper ── */
const GLITCH_CHARS = '§∞¶Ω≈∆µ∑∏∂∫√≠±÷×';
function glitchText(el, original, duration, cb) {
  let start = null;
  function step(ts) {
    if (!start) start = ts;
    const prog = (ts - start) / duration;
    if (prog < 0.7) {
      el.textContent = original.split('').map(() =>
        GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)]
      ).join('');
      requestAnimationFrame(step);
    } else {
      el.textContent = '';
      if (cb) cb();
    }
  }
  requestAnimationFrame(step);
}

/* ── typewriter ── */
function typewriter(container, text, delayPerChar = 80) {
  container.innerHTML = '';
  [...text].forEach((char, i) => {
    const span = document.createElement('span');
    span.className = 'new-rank-char';
    span.textContent = char === ' ' ? '\u00A0' : char;
    container.appendChild(span);
    setTimeout(() => span.classList.add('show'), i * delayPerChar);
  });
}

/* ── delay helper ── */
const wait = ms => new Promise(r => setTimeout(r, ms));

/* ── main sequence ── */
async function playSequence() {
  const isPrestige = _prestige > 0 && _oldRank?.index === 20;

  // 0ms — Flash white
  const flash = document.getElementById('flash');
  flash.classList.add('pop');
  if (navigator.vibrate) navigator.vibrate(80);
  await wait(80);
  flash.classList.remove('pop');
  await wait(50);

  // 180ms — Dim screen
  document.getElementById('scanDim').classList.add('on');
  await wait(300);

  // 480ms — Glitch old rank out
  const oldEl = document.getElementById('oldRankEl');
  if (_oldRank) {
    oldEl.textContent = _oldRank.name;
    glitchText(oldEl, _oldRank.name, 350, () => {
      oldEl.classList.add('gone');
    });
  }
  await wait(500);

  // 980ms — Show frame
  const frame = document.getElementById('rankFrame');
  document.getElementById('rankIcon').textContent = TIER_ICONS[_newRank.tier] || '🎖';
  frame.classList.add('show');
  spawnParticles(isPrestige);
  if (navigator.vibrate) navigator.vibrate([100, 50, 200]);
  await wait(250);

  // 1230ms — Typewriter rank name
  typewriter(document.getElementById('newRankText'), _newRank.name, 75);
  await wait(_newRank.name.length * 75 + 200);

  // Tier label
  document.getElementById('rankTierLabel').textContent = TIER_NAMES_TH[_newRank.tier] || '';

  // Prestige stars (if prestige mode)
  if (isPrestige) {
    document.getElementById('prestigeOverlay').classList.add('on');
    spawnParticles(true);
    const starsEl = document.getElementById('prestigeStarsEl');
    for (let i = 0; i < _prestige; i++) {
      const s = document.createElement('span');
      s.className = 'prestige-star';
      s.textContent = '★';
      starsEl.appendChild(s);
      await wait(150);
      s.classList.add('show');
    }
    if (navigator.vibrate) navigator.vibrate([50, 30, 50, 30, 300]);
  }
  await wait(400);

  // Next targets
  if (_nextRank) {
    const chips = document.getElementById('targetChips');
    const targets = [
      _nextRank.pushup && `Push-up <span>${_nextRank.pushup}</span>`,
      _nextRank.pullup && `Pull-up <span>${_nextRank.pullup}</span>`,
      _nextRank.plank  && `Plank <span>${Math.floor(_nextRank.plank/60)}:${String(_nextRank.plank%60).padStart(2,'0')}</span>`,
      _nextRank.run5km && `วิ่ง 5km <span>${Math.floor(_nextRank.run5km/60)}:${String(_nextRank.run5km%60).padStart(2,'0')}</span>`,
    ].filter(Boolean);

    chips.innerHTML = targets.map(t =>
      `<div class="target-chip">${t}</div>`
    ).join('');

    document.getElementById('nextTargets').classList.add('show');
  }
  await wait(400);

  // Confirm button
  document.getElementById('confirmBtn').classList.add('show');
}

function finish() {
  // Return to rank page
  window.location.href = 'rank.html';
}

/* ── bootstrap ── */
async function bootstrap() {
  try {
    const profile = await Storage.User.get();
    if (!profile) { window.location.href = 'rank.html'; return; }

    // Read params from URL
    const params    = new URLSearchParams(window.location.search);
    const newIdx    = parseInt(params.get('rank') || profile.rankIndex);
    const oldIdx    = parseInt(params.get('from')  || (newIdx - 1));
    const isPrestige= params.get('prestige') === '1';

    _newRank  = RANKS[newIdx] || RANKS[RANKS.length - 1];
    _oldRank  = RANKS[oldIdx] || null;
    _prestige = isPrestige ? (profile.prestigeStars || 0) : 0;
    _nextRank = RANKS[newIdx + 1] || null;

    await wait(300);
    playSequence();
  } catch (err) {
    console.error('[RankUp]', err);
    window.location.href = 'rank.html';
  }
}

document.addEventListener('DOMContentLoaded', bootstrap);
</script>
</body>
</html>
